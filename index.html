<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>NFL Model</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --line: #2a3038;
  --text: #e6e8ea; --muted: #8b949e; --accent: #58a6ff;
  --green-t: #3fb950; --green-bg: rgba(63,185,80,.12);
  --amber-t: #d29922; --amber-bg: rgba(210,153,34,.12);
  --red-t: #f85149; --red-bg: rgba(248,81,73,.12);
  --r-card: 14px; --r-pill: 999px;
}
* { box-sizing: border-box; margin: 0; }
body { background: var(--bg); color: var(--text);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif; font-size: 14px;
  padding-bottom: 40px; }
.wrap { max-width: 560px; margin: 0 auto; padding: 0 12px; }
header { padding: 18px 12px 10px; text-align: center; }
header h1 { font-size: 19px; font-weight: 800; letter-spacing: .5px; }
header .sub { color: var(--muted); font-size: 11px; margin-top: 4px; }
nav { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 5px;
  margin: 10px 0 14px; }
nav button { background: var(--panel); color: var(--muted); border: 1px solid var(--line);
  border-radius: 9px; padding: 8px 2px; font: inherit; font-size: 10.5px;
  font-weight: 700; cursor: pointer; letter-spacing: .3px; }
nav button.active { background: var(--accent); color: #08111e; border-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.card { background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 14px; margin-bottom: 12px; }
h2 { font-size: 13px; font-weight: 800; letter-spacing: .6px; color: var(--muted);
  text-transform: uppercase; margin-bottom: 10px; }
.muted { color: var(--muted); }
.chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip { font-size: 10.5px; padding: 3px 9px; border-radius: var(--r-pill);
  border: 1px solid; font-weight: 600; }
.chip.warn { color: var(--amber-t); border-color: var(--amber-t); background: var(--amber-bg); }
.chip.good { color: var(--green-t); border-color: var(--green-t); background: var(--green-bg); }
.chip.info { color: var(--accent); border-color: var(--accent); background: rgba(88,166,255,.1); }
/* rankings */
.rankrow { display: flex; align-items: center; gap: 8px; padding: 5px 0;
  border-bottom: 1px solid var(--line); cursor: pointer; }
.rankrow:last-child { border-bottom: none; }
.rk { width: 22px; color: var(--muted); font-size: 11px; font-weight: 700; text-align: right; }
.tc { width: 40px; text-align: center; border-radius: 6px; color: #fff;
  font-weight: 800; font-size: 11.5px; padding: 3px 0; }
.rbarwrap { flex: 1; height: 14px; position: relative; }
.rbar { position: absolute; top: 1px; bottom: 1px; border-radius: 4px; opacity: .9; }
.rval { width: 44px; text-align: right; font-weight: 700; font-size: 12px; }
.qbline { font-size: 10px; color: var(--muted); width: 90px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mixrow { display: none; padding: 8px 0 10px 30px; }
.rankrow.open + .mixrow { display: block; }
.mixbar { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 10.5px; }
.mixbar .lbl { width: 74px; color: var(--muted); font-weight: 600; }
.mixbar .bwrap { flex: 1; height: 9px; position: relative; }
.mixbar .b { position: absolute; top: 0; bottom: 0; border-radius: 3px; }
.mixbar .v { width: 40px; text-align: right; font-weight: 700; }
/* quadrant */
#quad { width: 100%; }
/* trajectories */
#trajsel { width: 100%; background: var(--panel2); color: var(--text);
  border: 1px solid var(--line); border-radius: 8px; padding: 8px; font: inherit;
  margin-bottom: 10px; }
/* game cards */
.game-card { background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 13px; margin-bottom: 11px; cursor: pointer; }
.matchrow { display: flex; align-items: center; justify-content: space-between; }
.teamblock { display: flex; flex-direction: column; gap: 3px; align-items: flex-start; }
.teamblock.right { align-items: flex-end; }
.teamchip { padding: 4px 12px; border-radius: 8px; color: #fff; font-weight: 800;
  font-size: 14px; }
.qb { font-size: 10px; color: var(--muted); }
.at { color: var(--muted); font-weight: 700; }
.ats-line { margin-top: 10px; padding: 9px 11px; background: var(--panel2);
  border-radius: 10px; font-size: 12.5px; line-height: 1.55; }
.ats-line b { font-weight: 800; }
.action { display: inline-block; padding: 2px 10px; border-radius: var(--r-pill);
  font-size: 10.5px; font-weight: 800; letter-spacing: .5px; }
.action.STRONG { background: var(--green-t); color: #06130a; }
.action.BET { background: var(--green-bg); color: var(--green-t); border: 1px solid var(--green-t); }
.action.LEAN { background: rgba(88,166,255,.12); color: var(--accent); border: 1px solid var(--accent); }
.action.PASS, .action.NO_LINE { background: var(--panel2); color: var(--muted); border: 1px solid var(--line); }
.detail { display: none; margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
.game-card.open .detail { display: block; }
.attr { display: flex; align-items: center; gap: 8px; margin: 3px 0; font-size: 10.5px; }
.attr .lbl { width: 108px; color: var(--muted); font-weight: 600; }
.attr .bwrap { flex: 1; height: 9px; position: relative; }
.attr .b { position: absolute; top: 0; bottom: 0; border-radius: 3px; }
.attr .v { width: 44px; text-align: right; font-weight: 700; }
/* results */
.res-strip { display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap; }
.res-box { flex: 1; min-width: 100px; background: var(--panel2); border-radius: 9px;
  padding: 7px 9px; font-size: 10.5px; color: var(--muted); }
.res-box b { display: block; color: var(--text); font-size: 12.5px; margin-top: 2px; }
.flag { font-size: 10.5px; padding: 3px 9px; border-radius: var(--r-pill);
  border: 1px solid; font-weight: 700; }
.flag.win { color: var(--green-t); border-color: var(--green-t); background: var(--green-bg); }
.flag.loss { color: var(--red-t); border-color: var(--red-t); background: var(--red-bg); }
footer { text-align: center; color: var(--muted); font-size: 10px; margin-top: 20px; }
</style>
</head>
<body>
<header>
  <h1>🏈 NFL MODEL</h1>
  <div class="sub" id="substamp"></div>
</header>
<div class="wrap">
  <nav id="nav">
    <button data-tab="rank" class="active">RANK</button>
    <button data-tab="mix">MIX</button>
    <button data-tab="map">MAP</button>
    <button data-tab="trend">TREND</button>
    <button data-tab="week">WEEK</button>
    <button data-tab="results">RESULTS</button>
  </nav>

  <section id="panel-rank" class="tab-panel active">
    <div class="card"><h2>Power ratings — points vs average team</h2>
      <div id="ranklist"></div></div>
  </section>

  <section id="panel-mix" class="tab-panel">
    <div class="card"><h2>Where each team's points come from</h2>
      <div class="muted" style="font-size:11px;margin-bottom:8px">
        EPA factor families weighted by the model's own coefficients.
        Tap a team on RANK for its mix, or browse all below.</div>
      <div id="mixlist"></div></div>
  </section>

  <section id="panel-map" class="tab-panel">
    <div class="card"><h2>Offense vs defense map</h2>
      <svg id="quad" viewBox="0 0 520 520"></svg></div>
  </section>

  <section id="panel-trend" class="tab-panel">
    <div class="card"><h2>Rating trajectory</h2>
      <select id="trajsel"></select>
      <svg id="trajsvg" viewBox="0 0 520 260" style="width:100%"></svg></div>
  </section>

  <section id="panel-week" class="tab-panel">
    <div class="card" style="padding:10px 14px">
      <h2 style="margin:0" id="weeklabel"></h2></div>
    <div id="weekgrid"></div>
  </section>

  <section id="panel-results" class="tab-panel">
    <div class="card" style="padding:10px 14px">
      <h2 style="margin:0" id="reslabel"></h2></div>
    <div id="resgrid"></div>
  </section>

  <footer id="foot"></footer>
</div>

<script>
const DATA = JSON.parse(document.getElementById('payload').textContent);
const TC = DATA.team_colors;
const col = t => (TC[t] || ['#555', '#999'])[0];
const col2 = t => (TC[t] || ['#555', '#999'])[1];
const fmt1 = v => (v > 0 ? '+' : '') + (+v).toFixed(1);
const fmt2 = v => (v > 0 ? '+' : '') + (+v).toFixed(2);
const pct = v => (v * 100).toFixed(0) + '%';
const spreadStr = (team, diff) => diff == null ? '—'
  : `${team} ${diff > 0 ? '-' : '+'}${Math.abs(diff).toFixed(1)}`;

document.getElementById('substamp').textContent =
  `${DATA.meta.model_version} · updated ${DATA.meta.updated_at}`;
document.getElementById('foot').textContent = DATA.meta.notes;

// nav
document.querySelectorAll('#nav button').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('#nav button').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.getElementById('panel-' + b.dataset.tab).classList.add('active');
}));

// ---- RANK ----
const MIX_ORDER = [['pass_off','PASS OFF'],['rush_off','RUSH OFF'],['to_off','BALL SEC'],
  ['qb','QB'],['pass_def','PASS DEF'],['rush_def','RUSH DEF'],['to_def','TAKEAWAY'],
  ['st','SPEC TEAMS'],['other','DISCIPLINE']];
function mixBars(r, scale) {
  const parts = Object.assign({}, r.mix, {qb: +(r.rating - r.off_rating - r.def_rating
    - r.misc_rating + (r.mix.qb || 0)).toFixed(2)});
  // qb part = off_rating minus offensive factor parts
  parts.qb = +(r.off_rating - (r.mix.pass_off + r.mix.rush_off + r.mix.to_off)).toFixed(2);
  return MIX_ORDER.map(([k, lbl]) => {
    const v = parts[k] ?? 0;
    const w = Math.min(48, Math.abs(v) / scale * 48);
    const left = v >= 0 ? 50 : 50 - w;
    const c = v >= 0 ? 'var(--green-t)' : 'var(--red-t)';
    return `<div class="mixbar"><span class="lbl">${lbl}</span>
      <span class="bwrap"><span class="b" style="left:${left}%;width:${w}%;background:${c}"></span></span>
      <span class="v">${fmt2(v)}</span></div>`;
  }).join('');
}
(function renderRank() {
  const list = document.getElementById('ranklist');
  const maxAbs = Math.max(...DATA.rankings.map(r => Math.abs(r.rating)), 1);
  list.innerHTML = DATA.rankings.map(r => {
    const w = Math.abs(r.rating) / maxAbs * 48;
    const left = r.rating >= 0 ? 50 : 50 - w;
    return `<div class="rankrow" data-team="${r.team}">
      <span class="rk">${r.rank}</span>
      <span class="tc" style="background:${col(r.team)}">${r.team}</span>
      <span class="qbline">${r.qb_backup ? '⚠ ' : ''}${r.qb_name}</span>
      <span class="rbarwrap"><span class="rbar" style="left:${left}%;width:${w}%;background:${col(r.team)}"></span></span>
      <span class="rval">${fmt1(r.rating)}</span></div>
    <div class="mixrow">${mixBars(r, 3)}</div>`;
  }).join('');
  list.querySelectorAll('.rankrow').forEach(row => row.addEventListener('click',
    () => row.classList.toggle('open')));
})();

// ---- MIX (all teams) ----
document.getElementById('mixlist').innerHTML = DATA.rankings.map(r =>
  `<div style="margin-bottom:14px"><div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
   <span class="tc" style="background:${col(r.team)}">${r.team}</span>
   <span class="muted" style="font-size:11px">#${r.rank} · ${fmt1(r.rating)} · ${r.qb_name}</span></div>
   ${mixBars(r, 3)}</div>`).join('');

// ---- MAP (off vs def quadrant) ----
(function renderMap() {
  const svg = document.getElementById('quad');
  const xs = DATA.rankings.map(r => r.off_rating);
  const ys = DATA.rankings.map(r => r.def_rating);
  const pad = 1.2;
  const xmin = Math.min(...xs) - pad, xmax = Math.max(...xs) + pad;
  const ymin = Math.min(...ys) - pad, ymax = Math.max(...ys) + pad;
  const X = v => 30 + (v - xmin) / (xmax - xmin) * 460;
  const Y = v => 490 - (v - ymin) / (ymax - ymin) * 460;
  let s = `<line x1="${X(0)}" y1="30" x2="${X(0)}" y2="490" stroke="#2a3038"/>
           <line x1="30" y1="${Y(0)}" x2="490" y2="${Y(0)}" stroke="#2a3038"/>
           <text x="480" y="${Y(0)-6}" fill="#8b949e" font-size="11" text-anchor="end">OFF →</text>
           <text x="${X(0)+6}" y="42" fill="#8b949e" font-size="11">DEF ↑</text>`;
  DATA.rankings.forEach(r => {
    s += `<circle cx="${X(r.off_rating)}" cy="${Y(r.def_rating)}" r="11"
           fill="${col(r.team)}" stroke="${col2(r.team)}" stroke-width="1.5"/>
          <text x="${X(r.off_rating)}" y="${Y(r.def_rating)+3.5}" fill="#fff"
           font-size="8.5" font-weight="800" text-anchor="middle">${r.team}</text>`;
  });
  svg.innerHTML = s;
})();

// ---- TREND ----
(function renderTrend() {
  const sel = document.getElementById('trajsel');
  sel.innerHTML = DATA.rankings.map(r =>
    `<option value="${r.team}">#${r.rank} ${r.team} — ${fmt1(r.rating)}</option>`).join('');
  const draw = team => {
    const pts = DATA.trajectories[team] || [];
    const svg = document.getElementById('trajsvg');
    if (!pts.length) { svg.innerHTML = ''; return; }
    const vals = pts.map(p => p.r);
    const vmin = Math.min(...vals, 0) - 1, vmax = Math.max(...vals, 0) + 1;
    const X = i => 14 + i / Math.max(pts.length - 1, 1) * 492;
    const Y = v => 246 - (v - vmin) / (vmax - vmin) * 232;
    let d = pts.map((p, i) => `${i ? 'L' : 'M'}${X(i)},${Y(p.r)}`).join('');
    // season boundary markers
    let marks = '';
    pts.forEach((p, i) => {
      if (i && p.s !== pts[i - 1].s)
        marks += `<line x1="${X(i)}" y1="14" x2="${X(i)}" y2="246" stroke="#2a3038" stroke-dasharray="3,3"/>
          <text x="${X(i)+3}" y="24" fill="#8b949e" font-size="9">${p.s}</text>`;
    });
    svg.innerHTML = `<line x1="14" y1="${Y(0)}" x2="506" y2="${Y(0)}" stroke="#2a3038"/>
      ${marks}<path d="${d}" fill="none" stroke="${col(team)}" stroke-width="2.5"/>
      <circle cx="${X(pts.length-1)}" cy="${Y(vals[vals.length-1])}" r="4" fill="${col(team)}"/>`;
  };
  sel.addEventListener('change', e => draw(e.target.value));
  draw(sel.value);
})();

// ---- WEEK (ATS-first cards) ----
(function renderWeek() {
  document.getElementById('weeklabel').textContent =
    DATA.meta.week_label || 'No upcoming slate scheduled';
  const grid = document.getElementById('weekgrid');
  if (!DATA.schedule_week.length) {
    grid.innerHTML = '<div class="card muted">No upcoming games yet — the slate appears when the schedule window opens.</div>';
    return;
  }
  grid.innerHTML = DATA.schedule_week.map(g => {
    const mSpread = spreadStr(g.home, g.pred_diff);
    const kSpread = g.market_diff == null ? 'no line yet' : spreadStr(g.home, g.market_diff);
    const atsLine = g.market_diff == null
      ? `Model line: <b>${mSpread}</b> · market line not posted yet`
      : `Model: <b>${mSpread}</b> · Market: <b>${kSpread}</b><br>
         Edge <b>${fmt1(g.edge)}</b> on <b>${g.side}</b> · cover ${pct(g.side === g.home ? g.cover_prob_home : 1 - g.cover_prob_home)}
         <span class="action ${g.action}">${g.action}</span>`;
    const chips = (g.chips || []).map(c =>
      `<span class="chip ${c.tone}">${c.text}</span>`).join('');
    const attr = (g.attribution || []).map(a => {
      const w = Math.min(48, Math.abs(a.pts) / 3 * 48);
      const left = a.pts >= 0 ? 50 : 50 - w;
      const c = a.pts >= 0 ? col(g.home) : col(g.away);
      return `<div class="attr"><span class="lbl">${a.key}</span>
        <span class="bwrap"><span class="b" style="left:${left}%;width:${w}%;background:${c}"></span></span>
        <span class="v">${fmt2(a.pts)}</span></div>`;
    }).join('');
    return `<div class="game-card">
      <div class="matchrow">
        <div class="teamblock"><span class="teamchip" style="background:${col(g.away)}">${g.away}</span>
          <span class="qb">${g.qb_away}</span></div>
        <span class="at">@</span>
        <div class="teamblock right"><span class="teamchip" style="background:${col(g.home)}">${g.home}</span>
          <span class="qb">${g.qb_home}</span></div>
      </div>
      <div class="ats-line">${atsLine}</div>
      ${chips ? `<div class="chiprow">${chips}</div>` : ''}
      <div class="detail">
        <div class="muted" style="font-size:10.5px;margin-bottom:6px">
          Win prob ${g.away} ${pct(1 - g.win_prob_home)} · ${g.home} ${pct(g.win_prob_home)}
          ${g.ml_home != null ? ` · ML ${g.ml_away > 0 ? '+' : ''}${g.ml_away} / ${g.ml_home > 0 ? '+' : ''}${g.ml_home}` : ''}
          · ${g.gameday}</div>
        ${attr}
      </div></div>`;
  }).join('');
  grid.querySelectorAll('.game-card').forEach(c =>
    c.addEventListener('click', () => c.classList.toggle('open')));
})();

// ---- RESULTS ----
(function renderResults() {
  document.getElementById('reslabel').textContent =
    'Last slate reviewed — ' + (DATA.results_week.label || '');
  const grid = document.getElementById('resgrid');
  const games = DATA.results_week.games || [];
  if (!games.length) {
    grid.innerHTML = '<div class="card muted">No completed slate yet.</div>';
    return;
  }
  grid.innerHTML = games.map(g => {
    const winner = g.margin > 0 ? g.home : g.away;
    const atsFlag = g.model_correct_ats == null ? ''
      : `<span class="flag ${g.model_correct_ats ? 'win' : 'loss'}">
         MODEL ATS ${g.model_correct_ats ? '✓' : '✗'}</span>`;
    const drivers = (g.drivers || []).map(d => {
      const w = Math.min(48, Math.abs(d.pts) / 6 * 48);
      const left = d.pts >= 0 ? 50 : 50 - w;
      const c = d.pts >= 0 ? col(g.home) : col(g.away);
      return `<div class="attr"><span class="lbl">${d.key}</span>
        <span class="bwrap"><span class="b" style="left:${left}%;width:${w}%;background:${c}"></span></span>
        <span class="v">${fmt1(d.pts)}</span></div>`;
    }).join('');
    return `<div class="game-card">
      <div class="matchrow">
        <div class="teamblock"><span class="teamchip" style="background:${col(g.away)}">${g.away}</span></div>
        <span class="at">@</span>
        <div class="teamblock right"><span class="teamchip" style="background:${col(g.home)}">${g.home}</span></div>
      </div>
      <div class="res-strip">
        <div class="res-box">Final margin<b>${winner} by ${Math.abs(g.margin)}</b></div>
        <div class="res-box">Model had<b>${spreadStr(g.home, g.pred_diff)}</b></div>
        <div class="res-box">Close<b>${g.market_diff == null ? '—' : spreadStr(g.home, g.market_diff)}</b></div>
      </div>
      <div class="chiprow">${atsFlag}
        <span class="chip info">cover: ${g.cover_side}</span></div>
      <div class="detail">
        <div class="muted" style="font-size:10.5px;margin-bottom:6px">
          Surprise vs expectation, in points (positive = broke ${g.home}'s way)</div>
        ${drivers}</div></div>`;
  }).join('');
  grid.querySelectorAll('.game-card').forEach(c =>
    c.addEventListener('click', () => c.classList.toggle('open')));
})();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
